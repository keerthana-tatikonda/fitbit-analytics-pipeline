version: 2

models:
  - name: fct_user_activity
    description: "Final activity fact table with user segments and summaries"
    columns:
      - name: user_id
        description: "Unique identifier for each user"
        tests:
          - not_null

      - name: activity_date
        description: "Date of the activity record"
        tests:
          - not_null

      - name: total_steps
        description: "Total steps taken that day"
        tests:
          - not_null

      - name: user_segment
        description: "Activity classification"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Active', 'Moderate', 'Sedentary']

      - name: calories
        description: "Total calories burned"
        tests:
          - not_null

  - name: fct_sleep_analysis
    description: "Sleep analysis fact table joining activity and sleep data"
    columns:
      - name: user_id
        description: "Unique identifier for each user"
        tests:
          - not_null

      - name: activity_date
        description: "Date of the record"
        tests:
          - not_null

      - name: hours_asleep
        description: "Total hours asleep"
        tests:
          - not_null

      - name: steps_category
        description: "Step count bucket for sleep analysis"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['1. Under 5,000 steps', '2. 5,000-8,000 steps',
                         '3. 8,000-10,000 steps', '4. Over 10,000 steps']

      - name: sleep_quality
        description: "Sleep quality label"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Good Sleeper', 'Moderate Sleeper', 'Poor Sleeper']